services:
  # База данных PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: nestjs_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nestdb
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: nestjs_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - app-network

  # NestJS приложение
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nestjs_app
    restart: always
    ports:
      - '${PORT:-5000}:5000'
    environment:
      PORT: ${PORT:-5000}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nestdb
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      - postgres
      - redis
    networks:
      - app-network
    command: sh -c "yarn prisma migrate deploy && node dist/src/main"

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge